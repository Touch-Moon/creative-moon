const log = document.getElementById('log');
const prog = document.getElementById('prog');

function print(msg, cls='') {
  const d = document.createElement('div');
  d.className = cls;
  d.textContent = msg;
  log.appendChild(d);
  log.scrollTop = log.scrollHeight;
}

function headers(isMultipart=false) {
  const h = { Authorization: `Bearer ${API_TOKEN}` };
  if (!isMultipart) h['Content-Type'] = 'application/json';
  return h;
}

async function sanityFetch(path, opts={}) {
  const res = await fetch(`${BASE}${path}`, { headers: headers(), ...opts });
  if (!res.ok) {
    const txt = await res.text();
    throw new Error(`${res.status} ${txt}`);
  }
  return res.json();
}

async function uploadImage(url, filename) {
  print(`  📸 이미지: ${filename}`, 'info');
  try {
    const proxyUrl = `https://corsproxy.io/?${encodeURIComponent(url)}`;
    const res = await fetch(proxyUrl);
    if (!res.ok) throw new Error(`fetch ${res.status}`);
    const blob = await res.blob();
    const ext = url.split('.').pop().split('?')[0].toLowerCase();
    const mime = {webp:'image/webp',jpg:'image/jpeg',jpeg:'image/jpeg',png:'image/png',svg:'image/svg+xml'}[ext] || 'image/jpeg';
    const file = new File([blob], filename, { type: mime });
    const fd = new FormData();
    fd.append('file', file);
    const upload = await fetch(`https://${PROJECT_ID}.api.sanity.io/v2024-01-01/assets/images/${DATASET}`, {
      method: 'POST',
      headers: { Authorization: `Bearer ${API_TOKEN}` },
      body: fd,
    });
    if (!upload.ok) throw new Error(`upload ${upload.status}`);
    const j = await upload.json();
    const ref = j.document._id;
    print(`     ✅ ${ref}`, 'ok');
    return { _type: 'image', asset: { _type: 'reference', _ref: ref } };
  } catch(e) {
    print(`     ⚠️ 실패: ${e.message}`, 'warn');
    return null;
  }
}

async function deleteAll() {
  print('\n🗑  기존 Work 문서 삭제 중...', 'warn');
  const data = await sanityFetch(`/data/query/${DATASET}?query=*[_type=="work"]._id`);
  const ids = data.result || [];
  if (ids.length === 0) { print('   삭제할 문서 없음', 'info'); return; }
  const mutations = ids.map(id => ({ delete: { id } }));
  await sanityFetch(`/data/mutate/${DATASET}`, {
    method: 'POST',
    body: JSON.stringify({ mutations }),
  });
  print(`   ✅ ${ids.length}개 삭제 완료`, 'ok');
}

async function run(clearFirst=false) {
  document.getElementById('btnRun').disabled = true;
  document.getElementById('btnClear').disabled = true;
  prog.style.display = 'block';
  log.innerHTML = '';

  try {
    print('🚀 Sanity Work Seed 시작', 'info');
    print(`   Project: ${PROJECT_ID} / Dataset: ${DATASET}\n`, 'info');

    if (clearFirst) await deleteAll();

    // 기존 slug 목록
    const existing = await sanityFetch(`/data/query/${DATASET}?query=*[_type=="work"].slug.current`);
    const existingSlugs = existing.result || [];
    print(`📋 기존 Work: ${existingSlugs.length}개\n`, 'info');

    let created = 0, skipped = 0;

    for (let i = 0; i < WORKS.length; i++) {
      const w = WORKS[i];
      prog.value = Math.round((i / WORKS.length) * 100);

      if (existingSlugs.includes(w.slug)) {
        print(`⏭️  스킵 (이미 존재): ${w.slug}`, 'skip');
        skipped++;
        continue;
      }

      print(`\n[${w.order}/16] ${w.title}`, 'info');

      const thumbnail         = await uploadImage(w.listThumb,  `${w.slug}-thumbnail`);
      const selectedThumbnail = await uploadImage(w.selThumb,   `${w.slug}-selected`);
      const heroImg           = await uploadImage(w.hero,       `${w.slug}-hero`);

      const doc = {
        _type: 'work',
        title: w.title,
        slug: { _type: 'slug', current: w.slug },
        year: w.year,
        subtitle: w.subtitle,
        overview: w.overview,
        listDescription: w.listDescription,
        services: w.services,
        order: w.order,
        cardSize: w.cardSize,
        ...(w.externalUrl && { externalUrl: w.externalUrl }),
        ...(thumbnail && { thumbnail }),
        ...(selectedThumbnail && { selectedThumbnail }),
        ...(heroImg && { heroMedia: { _type: 'object', type: 'image', image: heroImg } }),
      };

      try {
        const mut = await sanityFetch(`/data/mutate/${DATASET}`, {
          method: 'POST',
          body: JSON.stringify({ mutations: [{ create: doc }] }),
        });
        print(`  ✅ 생성: ${mut.results?.[0]?.id || 'ok'}`, 'ok');
        created++;
      } catch(e) {
        print(`  ❌ 생성 실패: ${e.message}`, 'err');
      }
    }

    prog.value = 100;
    print(`\n────────────────────────────`, 'info');
    print(`✅ 완료: ${created}개 생성, ${skipped}개 스킵`, 'ok');
    print(`   Sanity Studio: http://localhost:3333`, 'info');

    document.getElementById('btnClear').style.display = 'inline-block';

  } catch(e) {
    print(`\n❌ 에러: ${e.message}`, 'err');
  } finally {
    document.getElementById('btnRun').disabled = false;
    document.getElementById('btnClear').disabled = false;
  }
}

document.getElementById('btnRun').onclick   = () => run(false);
document.getElementById('btnClear').onclick = () => { if(confirm('기존 Work 문서를 전부 삭제하고 다시 넣겠습니까?')) run(true); };
</script>
